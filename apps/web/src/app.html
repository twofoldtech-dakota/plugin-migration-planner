<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" sizes="192x192" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#4f46e5" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="MigrateIQ" />
		<meta property="og:description" content="Digital experience migration planning — AI-powered discovery, risk analysis, and effort estimation for any tech stack." />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="MigrateIQ" />
		<meta name="twitter:description" content="Digital experience migration planning — AI-powered discovery, risk analysis, and effort estimation for any tech stack." />
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />
		<script>
			(function() {
				var theme = localStorage.getItem('theme');
				if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
